<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تفاصيل القطعة - متحف كلية الآداب والعلوم الإنسانية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Tajawal", "Tahoma", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-fuchsia-100 via-sky-100 to-emerald-100 text-slate-800">
    <main class="mx-auto w-full max-w-5xl p-3 sm:p-4 md:p-6">
      <header class="relative overflow-hidden rounded-2xl sm:rounded-3xl bg-gradient-to-l from-pink-600 via-violet-600 to-indigo-600 p-4 sm:p-6 text-white shadow-2xl">
        <div class="pointer-events-none absolute -left-12 -top-12 h-40 w-40 rounded-full bg-white/20 blur-2xl"></div>
        <div class="pointer-events-none absolute -bottom-12 -right-8 h-40 w-40 rounded-full bg-cyan-300/30 blur-2xl"></div>
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div class="flex flex-col items-start gap-2 sm:flex-row sm:items-center sm:gap-4">
            <img src="./assets/logo/logo1.png" alt="logo" class="h-20 w-20 sm:h-24 sm:w-24 md:h-28 md:w-28" />
            <div>
              <h1 class="text-xl font-extrabold leading-tight sm:text-2xl md:text-3xl">تفاصيل القطعة</h1>
              <p class="mt-2 text-xs text-indigo-100 sm:text-sm">عرض كامل للقطعة مع الوصف والصور والروابط.</p>
            </div>
          </div>
          <a href="./index.html" class="rounded-xl border border-white/40 bg-white/10 px-3 py-2 text-sm font-bold text-white transition hover:bg-white/20">
            العودة إلى القائمة
          </a>
        </div>
      </header>

      <section id="itemDetailsPage" class="mt-4 rounded-2xl sm:rounded-3xl border border-white/60 bg-white/90 p-4 sm:p-5 shadow-xl backdrop-blur">
        <p class="text-slate-500">جاري تحميل بيانات القطعة...</p>
      </section>

      <footer class="mt-4 rounded-2xl border border-white/60 bg-white/80 px-4 py-3 text-center text-sm font-semibold text-slate-700 shadow-md backdrop-blur">
        مشروع تخرج طالبات كلية الآداب والعلوم الإنسانية بجامعة طيبة بالمدينة المنورة الدفعة الثانية والعشرون سنة 2026
        <div class="mt-3 flex justify-center">
          <img
            src="./assets/logo/ut_logo.jpg"
            alt="شعار جامعة طيبة"
            class="h-14 w-auto sm:h-16 object-contain"
          />
        </div>
      </footer>
    </main>

    <script src="./app-data.js"></script>
    <script src="./item.js"></script>
  </body>
</html>
