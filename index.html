<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فهرس المتحف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Tajawal", "Tahoma", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <main class="mx-auto w-full max-w-7xl p-4 md:p-6">
      <header class="rounded-2xl bg-gradient-to-l from-indigo-600 to-violet-600 p-6 text-white shadow-lg">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <div class="flex items-center gap-3">
              <div>
                <img src="./assets/logo/logo1.png" alt="logo" class="w-40 h-40">
              </div>
              <div>
                <h1 class="text-2xl font-extrabold md:text-3xl">متحف كلية الادآب والعلوم الانسانية</h1>
                <p class="mt-2 text-sm text-indigo-100 md:text-base">
                  ابحث عن القطعة، ثم افتح تفاصيلها مع الصورة والرابط وكود QR.
                </p>
              </div>
            </div>
          </div>
          <a
            href="./admin.html"
            class="inline-flex items-center rounded-xl border border-white/30 bg-white/10 px-4 py-2 text-sm font-bold text-white transition hover:bg-white/20"
            >لوحة الإدارة</a
          >
        </div>
      </header>

      <section class="mt-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm md:p-5">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
          <div class="md:col-span-3">
            <label for="searchInput" class="mb-1 block text-sm font-semibold text-slate-700">بحث عن قطعة</label>
            <input
              id="searchInput"
              type="search"
              placeholder="اكتب اسم القطعة أو أي كلمة..."
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-base outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
            />
          </div>
          <div>
            <label for="classificationFilter" class="mb-1 block text-sm font-semibold text-slate-700"
              >التصنيف الوظيفي</label
            >
            <select
              id="classificationFilter"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
            >
              <option value="">الكل</option>
            </select>
          </div>
          <div>
            <label for="timePeriodFilter" class="mb-1 block text-sm font-semibold text-slate-700"
              >الفترة الزمنية</label
            >
            <select
              id="timePeriodFilter"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
            >
              <option value="">الكل</option>
            </select>
          </div>
          <div class="flex items-end">
            <small id="resultCount" class="inline-flex rounded-xl bg-slate-100 px-3 py-2 text-sm font-medium text-slate-600"></small>
          </div>
        </div>
      </section>

      <section class="mt-4 grid grid-cols-1 gap-4 lg:grid-cols-[380px_1fr]">
        <aside class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
          <div class="border-b border-slate-100 px-4 py-3">
            <h2 class="text-sm font-bold text-slate-700">قائمة القطع</h2>
          </div>
          <ul id="itemsList" class="max-h-[200vh] overflow-auto"></ul>
        </aside>

        <article id="detailsPanel" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
          <p class="text-slate-500">اختر قطعة من القائمة لعرض التفاصيل.</p>
        </article>
      </section>
    </main>

    <script src="./app-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
