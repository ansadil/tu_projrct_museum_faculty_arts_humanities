<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>متحف كلية الادآب والعلوم الانسانية
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Tajawal", "Tahoma", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-fuchsia-100 via-sky-100 to-emerald-100 text-slate-800">
    <main class="mx-auto w-full max-w-none px-3 py-3 sm:px-5 sm:py-4 md:px-8 md:py-5 lg:px-10 lg:py-6 xl:px-12 2xl:px-16">
      <header
        class="relative overflow-hidden rounded-2xl sm:rounded-3xl border border-white/70 bg-gradient-to-l from-fuchsia-100 via-violet-50 to-sky-100 p-4 sm:p-6 text-slate-800 shadow-xl backdrop-blur-sm"
      >
        <div class="pointer-events-none absolute -left-12 -top-12 h-40 w-40 rounded-full bg-fuchsia-300/25 blur-2xl"></div>
        <div class="pointer-events-none absolute -bottom-12 -right-8 h-40 w-40 rounded-full bg-emerald-200/35 blur-2xl"></div>
        <div class="pointer-events-none absolute left-1/2 top-1/2 h-32 w-32 -translate-x-1/2 -translate-y-1/2 rounded-full bg-sky-200/30 blur-3xl"></div>
        <div class="relative flex flex-wrap items-center justify-between gap-3">
          <div>
            <div class="flex flex-col items-start gap-3 sm:flex-row sm:items-center">
              <div>
                <img src="./assets/logo/logo1.png" alt="logo" class="h-24 w-24 sm:h-32 sm:w-32 md:h-40 md:w-40" />
              </div>
              <div>
                <h1 class="bg-gradient-to-r from-fuchsia-700 via-violet-700 to-indigo-700 bg-clip-text text-xl font-extrabold leading-tight text-transparent sm:text-2xl md:text-3xl">
                  متحف كلية الادآب والعلوم الانسانية
                </h1>
                <p class="mt-2 text-xs text-slate-600 sm:text-sm md:text-base">
                    يمكن البحث عن القطعة باسم القطعة أو التصنيف الوظيفي أو المصدر الجغرافي .
                </p>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div class="mt-4 sm:hidden">
        <button
          id="mobileFiltersOpenBtn"
          type="button"
          class="w-full rounded-2xl border border-violet-300 bg-gradient-to-r from-violet-100 to-fuchsia-100 px-4 py-3 text-sm font-bold text-violet-800 shadow-md transition hover:from-violet-200 hover:to-fuchsia-200"
          aria-expanded="false"
          aria-controls="filtersPanel"
        >
          البحث والفلاتر
        </button>
      </div>

      <div
        id="mobileFiltersBackdrop"
        class="fixed inset-0 z-40 hidden bg-slate-900/45 sm:hidden"
        aria-hidden="true"
      ></div>

      <section
        id="filtersPanel"
        class="fixed inset-y-0 right-0 z-50 mt-0 w-[90vw] max-w-md translate-x-full overflow-y-auto border-l border-white/60 bg-white/95 p-3 shadow-2xl backdrop-blur transition-transform duration-300 sm:relative sm:inset-auto sm:z-auto sm:mt-4 sm:w-auto sm:max-w-none sm:translate-x-0 sm:rounded-3xl sm:border sm:bg-white/80 sm:p-4 sm:shadow-xl md:p-5"
      >
        <div class="mb-3 flex items-center justify-between sm:hidden">
          <h2 class="text-sm font-extrabold text-violet-800">البحث والفلاتر</h2>
          <button
            id="mobileFiltersCloseBtn"
            type="button"
            class="rounded-xl border border-slate-300 bg-white px-3 py-1.5 text-xs font-bold text-slate-700"
            aria-label="إغلاق قائمة الفلاتر"
          >
            إغلاق
          </button>
        </div>
        <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4">
          <div class="sm:col-span-2 xl:col-span-5">
            <label for="searchInput" class="mb-1 block text-sm font-semibold text-slate-700">بحث عن قطعة</label>
            <input
              id="searchInput"
              type="search"
              placeholder="اكتب اسم القطعة أو أي كلمة..."
              class="w-full rounded-2xl border border-fuchsia-200 bg-white px-4 py-3 text-base outline-none transition focus:border-fuchsia-500 focus:ring-2 focus:ring-fuchsia-200"
            />
          </div>
          <div>
            <label for="generalClassificationFilter" class="mb-1 block text-sm font-semibold text-slate-700"
              >التصنيف الوظيفي</label
            >
            <select
              id="generalClassificationFilter"
              class="w-full rounded-2xl border border-violet-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-violet-500 focus:ring-2 focus:ring-violet-200"
            >
              <option value="">الكل</option>
            </select>
          </div>
          <div>
            <label for="sourceRegionFilter" class="mb-1 block text-sm font-semibold text-slate-700"
              >المصدر الجغرافي</label
            >
            <select
              id="sourceRegionFilter"
              class="w-full rounded-2xl border border-cyan-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-cyan-500 focus:ring-2 focus:ring-cyan-200"
            >
              <option value="">الكل</option>
            </select>
          </div>
          <div>
            <label for="timePeriodFilter" class="mb-1 block text-sm font-semibold text-slate-700">القرن</label>
            <select
              id="timePeriodFilter"
              class="w-full rounded-2xl border border-emerald-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200"
            >
              <option value="">الكل</option>
            </select>
          </div>
          <div class="flex items-end sm:col-span-2 xl:col-span-1">
            <small id="resultCount" class="inline-flex rounded-xl bg-gradient-to-r from-indigo-100 to-fuchsia-100 px-3 py-2 text-sm font-bold text-indigo-700"></small>
          </div>
          <div class="flex items-end sm:col-span-2 xl:col-span-1">
            <button
              id="resetFiltersBtn"
              type="button"
              class="w-full rounded-2xl border border-orange-300 bg-gradient-to-r from-amber-100 to-orange-100 px-4 py-3 text-sm font-bold text-orange-700 transition hover:from-amber-200 hover:to-orange-200"
            >
              مسح وإعادة تعيين الفلاتر
            </button>
          </div>
        </div>
      </section>

      <!-- Tailwind safelist: arbitrary grid cols used from app.js -->
      <span class="hidden xl:grid-cols-1 xl:grid-cols-[minmax(380px,28vw)_minmax(0,1fr)]" aria-hidden="true"></span>

      <section
        id="browseSection"
        class="mt-4 grid grid-cols-1 gap-4 xl:h-[74vh] xl:grid-cols-1"
      >
        <aside
          id="itemsPane"
          class="flex min-h-0 select-none flex-col overflow-hidden rounded-2xl sm:rounded-3xl border border-white/60 bg-white/90 shadow-xl backdrop-blur xl:w-full xl:max-w-none"
        >
          <div class="shrink-0 border-b border-fuchsia-100 bg-gradient-to-r from-fuchsia-50 to-indigo-50 px-3 py-2.5 sm:px-4">
            <h2 class="text-sm font-extrabold text-fuchsia-700">قائمة القطع</h2>
          </div>
          <ul
            id="itemsList"
            class="grid min-h-0 max-h-[75vh] flex-1 grid-cols-1 gap-2 overflow-y-auto overflow-x-hidden p-2 [overflow-anchor:none] select-none sm:grid-cols-2 sm:gap-2.5 sm:p-3 lg:grid-cols-3 lg:gap-3 xl:max-h-none xl:grid-cols-4 xl:gap-3"
          ></ul>
        </aside>

        <article
          id="detailsPanel"
          class="hidden min-h-0 touch-pan-y select-text overflow-y-auto overflow-x-hidden [-webkit-overflow-scrolling:touch] rounded-2xl sm:rounded-3xl border border-white/60 bg-white/90 p-4 sm:p-5 shadow-xl backdrop-blur xl:h-full"
        ></article>
      </section>

      <footer class="mt-4 rounded-2xl border border-white/60 bg-white/80 px-4 py-3 text-center text-sm font-semibold text-slate-700 shadow-md backdrop-blur">
        مشروع تخرج طالبات كلية الآداب والعلوم الإنسانية بجامعة طيبة بالمدينة المنورة الدفعة الثانية والعشرون سنة 2026
        <div class="mt-3 flex justify-center">
          <img
            src="./assets/logo/ut_logo.jpg"
            alt="شعار جامعة طيبة"
            class="h-14 w-auto sm:h-16 object-contain"
          />
        </div>
      </footer>
    </main>

    <script src="./app-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./qr-mount.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
